name: Deploy to FTP Server

on:
  push:
    branches:
      - master # Trigger deployment when you push to the 'master' branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Fetch your repository code

      - name: Install dependencies
        run: npm install # Install project dependencies

      - name: Build project
        run: npm run build # Generate the 'dist/' folder using Vite

      - name: Deploy to FTP server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftp
          local-dir: dist/ # Upload the Vite 'dist/' folder
          server-dir: /dams/ # Remote FTP directory
